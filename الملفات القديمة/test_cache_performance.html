<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار أداء نظام الكاش الذكي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .test-result {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            background: #f8f9fa;
        }
        .success { background: #d4edda; color: #155724; }
        .warning { background: #fff3cd; color: #856404; }
        .danger { background: #f8d7da; color: #721c24; }
        .performance-chart {
            height: 300px;
            margin: 20px 0;
            position: relative;
        }
        .bar {
            position: absolute;
            bottom: 0;
            width: 60px;
            background: linear-gradient(to top, #4CAF50, #8BC34A);
            border-radius: 5px 5px 0 0;
            transition: height 0.5s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            color: white;
            font-weight: bold;
            padding-bottom: 5px;
        }
        .bar.no-cache {
            background: linear-gradient(to top, #f44336, #ff9800);
            left: 100px;
        }
        .bar.with-cache {
            background: linear-gradient(to top, #4CAF50, #8BC34A);
            left: 200px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1 class="text-center mb-4">🚀 اختبار أداء نظام الكاش الذكي</h1>
        
        <div class="alert alert-info">
            <strong>ملاحظة:</strong> هذا الاختبار يقيس الفرق في الأداء بين استخدام الكاش وعدم استخدامه
        </div>

        <div class="text-center mb-4">
            <button class="btn btn-primary btn-lg" onclick="runAllTests()">
                <i class="fas fa-play"></i> بدء الاختبار الشامل
            </button>
            <button class="btn btn-success btn-lg ms-2" onclick="runCacheTest()">
                <i class="fas fa-bolt"></i> اختبار الكاش فقط
            </button>
            <button class="btn btn-warning btn-lg ms-2" onclick="clearAllCache()">
                <i class="fas fa-trash"></i> مسح الكاش
            </button>
        </div>

        <div id="results"></div>
        
        <div class="performance-chart" id="chart">
            <div class="bar no-cache" id="noCacheBar" style="height: 0px;">
                <span id="noCacheTime">0ms</span>
            </div>
            <div class="bar with-cache" id="withCacheBar" style="height: 0px;">
                <span id="withCacheTime">0ms</span>
            </div>
        </div>
        
        <div class="stats-grid" id="statsGrid"></div>
        
        <div class="mt-4">
            <h3>📊 تفاصيل الاختبار:</h3>
            <div id="detailedResults"></div>
        </div>
    </div>

    <script src="js/smartCache.js"></script>
    <script>
        /**
         * اختبار أداء نظام الكاش الذكي
         * يقارن بين الأداء مع وبدون استخدام الكاش
         * يعرض النتائج بشكل مرئي وتفصيلي
         */
        
        // بيانات وهمية للاختبار
        const testData = {
            stores: Array.from({length: 100}, (_, i) => ({
                id: `store_${i}`,
                name: `محل ${i + 1}`,
                priceType: ['retail', 'wholesale', 'distributor'][i % 3]
            })),
            sales: Array.from({length: 1000}, (_, i) => ({
                id: `sale_${i}`,
                storeId: `store_${i % 100}`,
                total: Math.random() * 1000,
                date: '2024-01-01'
            })),
            payments: Array.from({length: 500}, (_, i) => ({
                id: `payment_${i}`,
                storeId: `store_${i % 100}`,
                amount: Math.random() * 500,
                date: '2024-01-01'
            }))
        };
        
        // تعيين البيانات الوهمية
        window.data = testData;
        
        /**
         * حساب الرصيد بدون كاش (الطريقة القديمة)
         * يحسب الرصيد في كل مرة من البداية
         */
        function calculateBalanceWithoutCache(storeId) {
            const sales = testData.sales.filter(s => s.storeId === storeId);
            const payments = testData.payments.filter(p => p.storeId === storeId);
            const totalSales = sales.reduce((sum, sale) => sum + sale.total, 0);
            const totalPayments = payments.reduce((sum, payment) => sum + payment.amount, 0);
            return totalSales - totalPayments;
        }
        
        /**
         * اختبار الأداء بدون كاش
         * يحسب الوقت المطلوب لحساب أرصدة جميع المحلات
         */
        async function testWithoutCache() {
            const startTime = performance.now();
            const results = [];
            
            for (const store of testData.stores) {
                const balance = calculateBalanceWithoutCache(store.id);
                results.push(balance);
            }
            
            const endTime = performance.now();
            const duration = endTime - startTime;
            
            return {
                duration: duration.toFixed(2),
                operations: testData.stores.length,
                avgTime: (duration / testData.stores.length).toFixed(2)
            };
        }
        
        /**
         * اختبار الأداء مع الكاش
         * يستخدم نظام الكاش الذكي لتسريع العمليات
         */
        async function testWithCache() {
            // مسح الكاش أولاً للحصول على نتائج دقيقة
            balanceCache.clear();
            
            const startTime = performance.now();
            const results = [];
            
            // المرة الأولى - يتم الحساب والحفظ
            for (const store of testData.stores) {
                const balance = await balanceCache.calculateBalance(store.id);
                results.push(balance);
            }
            
            const firstPassTime = performance.now() - startTime;
            
            // المرة الثانية - من الكاش
            const cacheStartTime = performance.now();
            const cachedResults = [];
            
            for (const store of testData.stores) {
                const balance = await balanceCache.calculateBalance(store.id);
                cachedResults.push(balance);
            }
            
            const cacheTime = performance.now() - cacheStartTime;
            
            return {
                firstPass: firstPassTime.toFixed(2),
                cachedPass: cacheTime.toFixed(2),
                operations: testData.stores.length,
                improvement: ((1 - cacheTime/firstPassTime) * 100).toFixed(1),
                cacheStats: balanceCache.getStats()
            };
        }
        
        /**
         * تشغيل جميع الاختبارات
         * يقارن بين الأداء مع وبدون الكاش
         */
        async function runAllTests() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="alert alert-warning">جاري تشغيل الاختبارات...</div>';
            
            // اختبار بدون كاش
            const noCacheResults = await testWithoutCache();
            
            // اختبار مع كاش
            const withCacheResults = await testWithCache();
            
            // عرض النتائج
            displayResults(noCacheResults, withCacheResults);
            
            // تحديث الرسم البياني
            updateChart(noCacheResults.duration, withCacheResults.cachedPass);
            
            // عرض الإحصائيات
            displayStats(withCacheResults.cacheStats);
        }
        
        /**
         * عرض نتائج الاختبار
         */
        function displayResults(noCache, withCache) {
            const resultsDiv = document.getElementById('results');
            const speedup = (parseFloat(noCache.duration) / parseFloat(withCache.cachedPass)).toFixed(1);
            
            resultsDiv.innerHTML = `
                <div class="test-result success">
                    <h4>✅ نتائج الاختبار:</h4>
                    <ul>
                        <li><strong>بدون كاش:</strong> ${noCache.duration}ms لـ ${noCache.operations} عملية</li>
                        <li><strong>مع كاش (أول مرة):</strong> ${withCache.firstPass}ms</li>
                        <li><strong>مع كاش (من الذاكرة):</strong> ${withCache.cachedPass}ms</li>
                        <li><strong>التحسين:</strong> ${withCache.improvement}% أسرع</li>
                        <li><strong>السرعة:</strong> ${speedup}x أسرع مع الكاش</li>
                    </ul>
                </div>
            `;
            
            // تفاصيل إضافية
            const detailedDiv = document.getElementById('detailedResults');
            detailedDiv.innerHTML = `
                <div class="test-result">
                    <h5>معلومات تفصيلية:</h5>
                    <table class="table table-sm">
                        <tr>
                            <td>عدد المحلات:</td>
                            <td>${testData.stores.length}</td>
                        </tr>
                        <tr>
                            <td>عدد المبيعات:</td>
                            <td>${testData.sales.length}</td>
                        </tr>
                        <tr>
                            <td>عدد المدفوعات:</td>
                            <td>${testData.payments.length}</td>
                        </tr>
                        <tr>
                            <td>متوسط الوقت بدون كاش:</td>
                            <td>${noCache.avgTime}ms لكل محل</td>
                        </tr>
                        <tr>
                            <td>متوسط الوقت مع كاش:</td>
                            <td>${(parseFloat(withCache.cachedPass) / withCache.operations).toFixed(3)}ms لكل محل</td>
                        </tr>
                    </table>
                </div>
            `;
        }
        
        /**
         * تحديث الرسم البياني
         */
        function updateChart(noCacheTime, withCacheTime) {
            const maxTime = Math.max(parseFloat(noCacheTime), parseFloat(withCacheTime));
            const scale = 250 / maxTime;
            
            document.getElementById('noCacheBar').style.height = (parseFloat(noCacheTime) * scale) + 'px';
            document.getElementById('withCacheBar').style.height = (parseFloat(withCacheTime) * scale) + 'px';
            
            document.getElementById('noCacheTime').textContent = noCacheTime + 'ms';
            document.getElementById('withCacheTime').textContent = withCacheTime + 'ms';
        }
        
        /**
         * عرض إحصائيات الكاش
         */
        function displayStats(stats) {
            const statsGrid = document.getElementById('statsGrid');
            
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${stats.size}</div>
                    <div class="stat-label">عناصر في الكاش</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.hits}</div>
                    <div class="stat-label">استخدامات ناجحة</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.misses}</div>
                    <div class="stat-label">عمليات حساب جديدة</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.hitRate}</div>
                    <div class="stat-label">نسبة النجاح</div>
                </div>
            `;
        }
        
        /**
         * اختبار الكاش فقط
         */
        async function runCacheTest() {
            const results = await testWithCache();
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = `
                <div class="test-result success">
                    <h4>🎯 نتائج اختبار الكاش:</h4>
                    <ul>
                        <li><strong>الحساب الأول:</strong> ${results.firstPass}ms</li>
                        <li><strong>من الكاش:</strong> ${results.cachedPass}ms</li>
                        <li><strong>التحسين:</strong> ${results.improvement}%</li>
                        <li><strong>نسبة النجاح:</strong> ${results.cacheStats.hitRate}</li>
                    </ul>
                </div>
            `;
            
            displayStats(results.cacheStats);
        }
        
        /**
         * مسح جميع الكاش
         */
        function clearAllCache() {
            if (typeof balanceCache !== 'undefined') balanceCache.clear();
            if (typeof reportCache !== 'undefined') reportCache.clear();
            if (typeof generalCache !== 'undefined') generalCache.clear();
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="test-result warning">
                    <h4>🗑️ تم مسح جميع الكاش</h4>
                    <p>الكاش فارغ الآن وجاهز للاختبار من جديد</p>
                </div>
            `;
            
            document.getElementById('statsGrid').innerHTML = '';
            document.getElementById('detailedResults').innerHTML = '';
        }
    </script>
</body>
</html>
